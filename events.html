<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKILLEVE — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="page-events">

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav class="navbar glass">
  <div class="logo">SKILL<span class="accent">EVE</span></div>
  <div class="nav-center">
    <a href="home.html" class="nav-link">Home</a>
    <a href="skills.html" class="nav-link">Skills</a>
    <a href="events.html" class="nav-link active">Events</a>
  </div>
  <div class="nav-right">
    <button class="btn btn-primary btn-sm" onclick="openAddEvent()">+ Add Event</button>
    <button class="profile-btn" onclick="toggleProfileSidebar()" title="Profile">
      <div class="nav-avatar">U</div>
    </button>
  </div>
</nav>
<!-- PROFILE SIDEBAR -->
<div class="profile-sidebar glass" id="profileSidebar">
  <div class="psb-header">
    <div class="psb-avatar" id="psbAvatar">U</div>
    <div>
      <div class="psb-name" id="psbName">Guest User</div>
      <div class="psb-email" id="psbEmail">guest@skilleve.app</div>
    </div>
  </div>
  <div class="psb-divider"></div>
  <nav class="psb-menu">
    <a class="psb-item" href="home.html">🏠 <span>Home</span></a>
    <a class="psb-item" href="skills.html">💡 <span>My Skills</span></a>
    <a class="psb-item" href="events.html">🎯 <span>Events</span></a>
    <button class="psb-item" onclick="openSettings()">⚙️ <span>Settings</span></button>
    <button class="psb-item" onclick="toggleTheme()">🌙 <span>Dark / Light</span></button>
    <button class="psb-item psb-logout" onclick="logOut()">🚪 <span>Log Out</span></button>
  </nav>
  <div class="psb-footer">SkillEve v1.0</div>
</div>
<div class="psb-overlay" id="psbOverlay" onclick="toggleProfileSidebar()"></div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="addEventModal">
  <div class="modal-box glass">
    <div class="modal-header">
      <h3>➕ Add New Event</h3>
      <button class="close-btn" onclick="closeAddEvent()">✕</button>
    </div>
    <div class="modal-body">
      <input class="modal-input" id="evtName" placeholder="Event name *">
      <input class="modal-input" id="evtDate" placeholder="Date (e.g. Jun 1, 2025) *">
      <select class="modal-input" id="evtCat">
        <option value="hackathon">Hackathon</option>
        <option value="workshop">Workshop</option>
        <option value="competition">Competition</option>
      </select>
      <textarea class="modal-input" id="evtDesc" placeholder="Description *" rows="3"></textarea>
      <input class="modal-input" id="evtTag" placeholder="Badge label (e.g. 🏆 Prize ₹10K)">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeAddEvent()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitAddEvent()">Add Event</button>
    </div>
  </div>
</div>

<section class="page-header">
  <h1>Upcoming <span class="gradient-text">Events</span></h1>
  <p class="hero-sub">Participate, compete and showcase your talent</p>
</section>

<div class="search-wrapper">
  <div class="search-box glass">
    <span class="search-icon">🔍</span>
    <input id="searchEvent" placeholder="Search events, e.g. Hackathon, Workshop…" oninput="searchEvent()">
    <button class="btn btn-primary btn-sm" onclick="searchEvent()">Search</button>
  </div>
  <div class="filter-chips">
    <button class="chip active" onclick="filterEvent('all', this)">All</button>
    <button class="chip" onclick="filterEvent('hackathon', this)">Hackathon</button>
    <button class="chip" onclick="filterEvent('workshop', this)">Workshop</button>
    <button class="chip" onclick="filterEvent('competition', this)">Competition</button>
  </div>
</div>

<div id="eventList" class="cards-grid"></div>

<script src="app.js"></script>
</body>
</html>
