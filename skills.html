<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKILLEVE — Skills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="page-skills">

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav class="navbar glass">
  <div class="logo">SKILL<span class="accent">EVE</span></div>
  <div class="nav-center">
    <a href="home.html" class="nav-link">Home</a>
    <a href="skills.html" class="nav-link active">Skills</a>
    <a href="events.html" class="nav-link">Events</a>
  </div>
  <div class="nav-right">
    <button class="profile-btn" onclick="toggleProfileSidebar()" title="Profile">
      <div class="nav-avatar">U</div>
    </button>
  </div>
</nav>
<!-- PROFILE SIDEBAR -->
<div class="profile-sidebar glass" id="profileSidebar">
  <div class="psb-header">
    <div class="psb-avatar" id="psbAvatar">U</div>
    <div>
      <div class="psb-name" id="psbName">Guest User</div>
      <div class="psb-email" id="psbEmail">guest@skilleve.app</div>
    </div>
  </div>
  <div class="psb-divider"></div>
  <nav class="psb-menu">
    <a class="psb-item" href="home.html">🏠 <span>Home</span></a>
    <a class="psb-item" href="skills.html">💡 <span>My Skills</span></a>
    <a class="psb-item" href="events.html">🎯 <span>Events</span></a>
    <button class="psb-item" onclick="openSettings()">⚙️ <span>Settings</span></button>
    <button class="psb-item" onclick="toggleTheme()">🌙 <span>Dark / Light</span></button>
    <button class="psb-item psb-logout" onclick="logOut()">🚪 <span>Log Out</span></button>
  </nav>
  <div class="psb-footer">SkillEve v1.0</div>
</div>
<div class="psb-overlay" id="psbOverlay" onclick="toggleProfileSidebar()"></div>

<section class="page-header">
  <h1>Explore <span class="gradient-text">Skills</span></h1>
  <p class="hero-sub">Find someone to teach you or offer your expertise</p>
</section>

<div class="search-wrapper">
  <div class="search-box glass">
    <span class="search-icon">🔍</span>
    <input id="search" placeholder="Search skills, e.g. Web Dev, AI, Design…" oninput="searchSkill()">
    <button class="btn btn-primary btn-sm" onclick="searchSkill()">Search</button>
  </div>
  <div class="filter-chips">
    <button class="chip active" onclick="filterSkill('all', this)">All</button>
    <button class="chip" onclick="filterSkill('tech', this)">Tech</button>
    <button class="chip" onclick="filterSkill('design', this)">Design</button>
    <button class="chip" onclick="filterSkill('business', this)">Business</button>
    <button class="chip" onclick="filterSkill('creative', this)">Creative</button>
  </div>
</div>

<div id="skillList" class="cards-grid"></div>

<!-- Chat Sidebar Toggle -->
<button class="chat-fab" onclick="toggleChat()" title="Open chats">
  💬
  <span class="chat-badge" id="chatBadge" style="display:none">0</span>
</button>

<div id="chatList" class="chat-sidebar glass">
  <div class="chat-sidebar-header">
    <h3>My Chats</h3>
    <button onclick="toggleChat()" class="close-btn">✕</button>
  </div>
  <div id="chatListInner"></div>
</div>
<div class="chat-overlay" id="chatOverlay" onclick="toggleChat()"></div>

<script src="app.js"></script>
</body>
</html>
